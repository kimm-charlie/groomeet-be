spring:
  datasource:
    url: jdbc:h2:mem:motd-stomp-test
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 300
    defer-datasource-initialization: true

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG