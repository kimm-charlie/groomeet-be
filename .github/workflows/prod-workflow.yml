name: motd-prod auto deploy

on:
  push:
    tags:
      - 'v*.*.*'  # 모든 버전 태그를 트리거로 설정

permissions:
  contents: read

env:
  TZ: Asia/Seoul
  BE_WORKING_DIR: .
  APPLICATION_FILE_PATH: ./src/main/resources/application.yml

jobs:
  # Job[1]: BACKEND -> docker hub로 build & push
  be-deploy:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: ${{ env.BE_WORKING_DIR }}

    outputs:
      version: ${{ steps.extract_version.outputs.version }}  # Output으로 설정

    steps:
      # 1. Source 단계
      - name: Checkout Source Code
        uses: actions/checkout@v3

      # JDK 세팅
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      # 2. yml 파일 변경
      - name: Change Spring Active Profile
        run: |
          touch '${{ env.APPLICATION_FILE_PATH }}'
          echo '${{ secrets.APPLICATION_PROD }}' > '${{ env.APPLICATION_FILE_PATH }}'

        # 3. build 단계
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Extract version from GitHub tag
        id: extract_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}  # GitHub 태그에서 버전 추출
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "::set-output name=version::${VERSION}"  # output으로 설정

      - name: Build with Gradle
        run: ./gradlew clean build

      # 4. docker hub로 build & push
      - name: docker build and push
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -f Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/motd-prod-be:${{ env.VERSION }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/motd-prod-be:${{ env.VERSION }}

  # job[3]: EC2에서 docker 이미지 pull하고 실행
  SSH-Transfer:
    needs: [be-deploy]
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ needs.be-deploy.outputs.version }}  # 이전 Job의 output을 env로 설정

    steps:
      - name: Get Github Actions IP
        id: get-ip
        run: |
          response=$(curl -s canhazip.com)
          echo "ipv4=$response" >> $GITHUB_ENV
          echo "ipv4='$response'" >> "$GITHUB_OUTPUT"

      - name: Setting environment variables
        run: |
          echo "AWS_DEFAULT_REGION=ap-northeast-2" >> $GITHUB_ENV
          echo "AWS_SG_ID=${{ secrets.PROD_AWS_SG_ID }}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Add Github Actions IP to Security group
        run: |
          aws ec2 authorize-security-group-ingress --group-id ${{ env.AWS_SG_ID }} --protocol tcp --port 22 --cidr ${{ env.ipv4 }}/32

        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2

      - name: SSH Transfer
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            echo "Deploying with IMAGE_TAG: ${{ env.IMAGE_TAG }}"  # 로그에 IMAGE_TAG 출력
            sudo chmod 777 /home/ubuntu/deploy.sh
            IMAGE_TAG=${{ env.IMAGE_TAG }} sudo -E /home/ubuntu/deploy.sh # 여기 안에서 blue/green + ALB까지 다 처리
            sudo docker image prune -a -f

      - name: Remove Github Actions IP from security group
        run: |
          aws ec2 revoke-security-group-ingress --group-id ${{ env.AWS_SG_ID }} --protocol tcp --port 22 --cidr ${{ env.ipv4 }}/32
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
